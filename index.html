<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XII A - THE LEGENDS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-page { background-color: #3b82f6 !important; color: white !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto sticky top-0 z-50 bg-[#0f172a]/90 backdrop-blur-md">
        <h1 class="text-2xl font-bold tracking-tighter text-blue-400">CLASSCORE.</h1>
        <div class="space-x-8 hidden md:block">
            <a href="#home" class="hover:text-blue-400 transition">Home</a>
            <a href="#gallery" class="hover:text-blue-400 transition">Gallery</a>
            <a href="#struktur" class="hover:text-blue-400 transition">Struktur</a>
        </div>
    </nav>

    <section id="home" class="py-24 text-center px-4">
        <h2 class="text-6xl md:text-8xl font-black mb-4 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent uppercase tracking-tighter">
            XII A
        </h2>
        <p class="text-slate-400 max-w-xl mx-auto text-lg mb-10">
            Solidaritas tanpa batas. Berjuang bersama untuk masa depan yang lebih cerah.
        </p>
        <a href="#struktur" class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-full font-bold transition">
            Eksplorasi Kelas
        </a>
    </section>

    <section id="gallery" class="py-20 max-w-6xl mx-auto px-6">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-bold uppercase tracking-widest">Memories</h2>
            <div class="h-1 w-20 bg-blue-500 mx-auto mt-4 rounded-full"></div>
        </div>

        <div id="gallery-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>

        <div class="flex justify-center mt-12 gap-3">
            <button onclick="renderGallery(1)" id="btn-1" class="nav-btn w-12 h-12 rounded-xl glass font-bold transition">1</button>
            <button onclick="renderGallery(2)" id="btn-2" class="nav-btn w-12 h-12 rounded-xl glass font-bold transition">2</button>
            <button onclick="renderGallery(3)" id="btn-3" class="nav-btn w-12 h-12 rounded-xl glass font-bold transition">3</button>
        </div>
    </section>

    <section id="struktur" class="py-20 bg-slate-900/50">
        <div class="max-w-6xl mx-auto px-6 text-center">
            <h2 class="text-4xl font-bold uppercase mb-16">Organisasi Kelas</h2>

            <div id="wali-kelas" class="mb-20"></div>

            <div id="pengurus" class="grid grid-cols-2 md:grid-cols-4 gap-8 mb-24"></div>

            <h3 class="text-2xl font-bold text-slate-500 mb-10 uppercase italic">Daftar Siswa (34)</h3>
            <div id="siswa-list" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-6"></div>
        </div>
    </section>

    <footer class="py-12 text-center text-slate-600 border-t border-white/5">
        <p>© 2026 XII A - The Legends. All Rights Reserved.</p>
    </footer>

    <script>
        // CONFIG DATA
        const WALI_NAME = "Nama Wali Kelas, S.Pd.";
        const PENGURUS = [
            { role: "Ketua", name: "Nama Ketua", file: "ketua.jpg" },
            { role: "Wakil", name: "Nama Wakil", file: "wakil.jpg" },
            { role: "Sekretaris", name: "Nama Sekretaris", file: "sekretaris.jpg" },
            { role: "Bendahara", name: "Nama Bendahara", file: "bendahara.jpg" }
        ];

        // 1. RENDER GALERI OTOMATIS
        function renderGallery(page) {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            
            // Tentukan range foto per halaman (12 foto per hal)
            const start = (page - 1) * 12 + 1;
            const end = Math.min(page * 12, 34);

            for (let i = start; i <= end; i++) {
                grid.innerHTML += `
                    <div class="aspect-square glass rounded-2xl overflow-hidden group">
                        <img src="moment${i}.jpg" onerror="this.src='https://via.placeholder.com/400?text=Moment+${i}'" 
                        class="w-full h-full object-cover opacity-50 group-hover:opacity-100 transition duration-500 scale-110 group-hover:scale-100">
                    </div>`;
            }

            // Update button
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-page'));
            document.getElementById('btn-' + page).classList.add('active-page');
        }

        // 2. RENDER STRUKTUR OTOMATIS
        function initStruktur() {
            // Wali Kelas
            document.getElementById('wali-kelas').innerHTML = `
                <div class="inline-block">
                    <div class="w-40 h-40 rounded-full border-4 border-emerald-500 p-1 glass mx-auto mb-4 overflow-hidden">
                        <img src="walikelas.jpg" onerror="this.src='https://via.placeholder.com/150?text=Guru'" class="w-full h-full object-cover rounded-full">
                    </div>
                    <h4 class="text-2xl font-bold">${WALI_NAME}</h4>
                    <p class="text-emerald-400 uppercase text-sm tracking-widest">Wali Kelas</p>
                </div>`;

            // Pengurus
            const pGrid = document.getElementById('pengurus');
            PENGURUS.forEach(p => {
                pGrid.innerHTML += `
                    <div>
                        <div class="w-24 h-24 mx-auto mb-3 rounded-2xl glass overflow-hidden border border-blue-500/20">
                            <img src="${p.file}" onerror="this.src='https://via.placeholder.com/150?text=${p.role}'" class="w-full h-full object-cover">
                        </div>
                        <h5 class="font-bold">${p.role}</h5>
                        <p class="text-slate-400 text-xs uppercase">${p.name}</p>
                    </div>`;
            });

            // 34 Siswa
            const sGrid = document.getElementById('siswa-list');
            for (let i = 1; i <= 34; i++) {
                let abs = i < 10 ? '0' + i : i;
                sGrid.innerHTML += `
                    <div class="group">
                        <div class="aspect-[3/4] rounded-xl glass overflow-hidden mb-2 border border-white/5 group-hover:border-blue-500/50 transition">
                            <img src="siswa${i}.jpg" onerror="this.src='https://via.placeholder.com/150?text=${abs}'" class="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition duration-500">
                        </div>
                        <p class="text-[10px] text-slate-500">ABSEN ${abs}</p>
                        <p class="text-[11px] font-bold truncate uppercase">Siswa ${i}</p>
                    </div>`;
            }
        }

        // Jalankan
        renderGallery(1);
        initStruktur();
    </script>
</body>
</html>
